<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HETS Tickets</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</head>

<body>

<div class="ticket">

    <img src="images/fond-ticket.png" class="fond" alt="Fond du ticket">

    <div id="qrcode"></div>

    <div id="numero">ESY-001</div>

    <div id="date">📅 Samedi 27</div>

    <div id="heure">🕟 16h30</div>

    <div id="lieu">📍 Aktowers</div>

</div>

<div class="buttons">

    <button onclick="precedent()">⬅️ Précédent</button>

    <button onclick="suivant()">➡️ Suivant</button>

    <button onclick="telechargerPNG()">📥 Télécharger</button>

</div>

<script src="script.js"></script>

</body>
</html>
